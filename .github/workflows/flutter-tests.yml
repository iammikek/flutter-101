name: Flutter tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: flutter test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Run unit/widget tests
        run: flutter test

  integration_ios:
    name: integration_test (iOS simulator)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Xcode setup
        shell: bash
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          sudo xcodebuild -license accept
          sudo xcodebuild -runFirstLaunch

      - name: Boot an iOS simulator
        shell: bash
        run: |
          python3 - <<'PY'
          import json, subprocess

          def sh(cmd: str) -> str:
            return subprocess.check_output(cmd, shell=True, text=True).strip()

          devices = json.loads(sh("xcrun simctl list -j devices available"))
          all_devices = []
          for runtime, devs in devices.get("devices", {}).items():
            for d in devs:
              # Prefer iOS runtimes; filter out watches/tvs etc.
              if "iOS" not in runtime:
                continue
              name = d.get("name", "")
              if "iphone" not in name.lower():
                continue
              all_devices.append((runtime, d))

          if not all_devices:
            raise SystemExit("No available iPhone simulators found via simctl.")

          # Prefer the newest runtime by string sort (good enough for CI).
          all_devices.sort(key=lambda x: x[0], reverse=True)
          runtime, dev = all_devices[0]
          udid = dev["udid"]
          name = dev.get("name", "iPhone")
          print(f"Booting simulator: {name} ({udid}) runtime={runtime}")

          sh(f"xcrun simctl boot '{udid}' || true")
          sh(f"xcrun simctl bootstatus '{udid}' -b")
          print(udid)
          with open("DEVICE_ID", "w", encoding="utf-8") as f:
            f.write(udid)
          PY

          echo "DEVICE_ID=$(cat DEVICE_ID)" >> "$GITHUB_ENV"
          open -a Simulator --args -CurrentDeviceUDID "$DEVICE_ID" || true

      - name: Run iOS integration tests
        run: flutter test integration_test -d "$DEVICE_ID"

